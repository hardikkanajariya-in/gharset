<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">GharSet logo</title>
  <desc id="desc">GharSet logo with a house-shaped organizer icon and the tagline Smart organizers for every Indian home.</desc>
  <defs>
    <style>
      .green { fill: #35562F; }
      .green-stroke { stroke: #35562F; }
      .terracotta { fill: #CF744E; }
      .wordmark { font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; font-weight: 700; font-size: 128px; fill: #35562F; }
      .tagline { font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; font-weight: 500; font-size: 42px; fill: #35562F; }
    </style>
  </defs>

  <!-- Icon -->
  <g transform="translate(36,42)">
    <!-- House outline -->
    <path d="M 46 132 L 46 252 Q 46 268 62 268 L 268 268 Q 284 268 284 252 L 284 132 L 178 46 Q 167 38 156 46 Z"
          fill="none" stroke="#35562F" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Chimney -->
    <path d="M 232 72 L 232 26 L 270 26 L 270 110"
          fill="none" stroke="#35562F" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Dividers -->
    <path d="M 65 167 H 265" fill="none" stroke="#35562F" stroke-width="12" stroke-linecap="round"/>
    <path d="M 163 89 V 265" fill="none" stroke="#35562F" stroke-width="12" stroke-linecap="round"/>

    <!-- Top-left box -->
    <rect x="83" y="112" width="72" height="52" rx="8" class="terracotta"/>
    <rect x="108" y="126" width="22" height="10" rx="5" fill="#fff" opacity="0.95"/>

    <!-- Plant -->
    <rect x="184" y="135" width="48" height="32" rx="8" class="green"/>
    <path d="M 205 135 C 200 113 185 101 169 98 C 169 116 181 132 205 135 Z" class="green"/>
    <path d="M 208 135 C 214 113 230 101 246 98 C 246 116 232 132 208 135 Z" class="green"/>
    <path d="M 208 135 C 209 116 218 101 228 88 C 220 89 212 93 208 99 C 203 93 195 89 188 88 C 198 101 207 116 208 135 Z" class="green"/>

    <!-- Bottom-left folded towels -->
    <rect x="76" y="200" width="92" height="22" rx="11" class="green"/>
    <rect x="76" y="233" width="92" height="22" rx="11" class="green"/>
    <rect x="90" y="209" width="44" height="5" rx="2.5" fill="#F8F5EF" opacity="0.95"/>
    <rect x="90" y="242" width="44" height="5" rx="2.5" fill="#F8F5EF" opacity="0.95"/>

    <!-- Bottom-right storage bin -->
    <rect x="186" y="204" width="84" height="52" rx="8" class="terracotta"/>
    <rect x="216" y="216" width="24" height="9" rx="4.5" fill="#fff" opacity="0.95"/>
  </g>

  <!-- Wordmark -->
  <text x="385" y="210" class="wordmark">GharSet</text>
  <text x="390" y="282" class="tagline">Smart organizers for every Indian home<tspan fill="#CF744E">.</tspan></text>
</svg>
